# =========================================================================
# Generic AI-Agent CI/CD Pipeline (Ticket System Agnostic)
# =========================================================================

name: AI-Agent CI/CD Pipeline

# 1. Trigger the pipeline on any push (including agent feature branches)
on:
  push:
    branches:
      - '**' # Matches any branch name

# ==========================================
# ENVIRONMENT VARIABLES (Configure as needed)
# ==========================================
env:
  # Ticket System Configuration (swap JIRA for AZURE_DEVOPS, LINEAR, GITHUB_ISSUES, etc.)
  TICKET_SYSTEM: "JIRA"  # Options: JIRA, AZURE_DEVOPS, LINEAR, GITHUB_ISSUES, ASANA
  
  # Deployment Target (Optional)
  DEPLOYMENT_TARGET: "netlify"  # Options: aws, gcp, azure, github-pages, docker, netlify, none
  DEPLOYMENT_BRANCH: "main"  # Only deploy on this branch

jobs:
  # ==========================================
  # JOB 0: Validate Repository State
  # ==========================================
  validate-workspace:
    name: Validate Workspace State
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: View modified files
        run: |
          echo "🔍 Files modified in this push:"
          git diff-tree --no-commit-id --name-only -r ${{ github.sha }} || echo "First commit"

      - name: Display workspace info
        run: |
          echo "📊 Workspace Size: $(du -sh . | cut -f1)"
          echo "📁 Top level files:"
          ls -la

  # ==========================================
  # JOB 1: Linting / Static Code Analysis
  # ==========================================
  syntax-check:
    name: Code Syntax & Linting
    runs-on: ubuntu-latest
    needs: validate-workspace
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade Pip & Install Tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black

      - name: Python Syntax & Linting
        continue-on-error: true
        run: |
          # Only run Python linters if .py files exist in the project
          if [ -n "$(find . -name '*.py' -not -path '*/\.*')" ]; then
            echo "🔍 Verifying Python syntax..."
            find . -name '*.py' -not -path '*/\.*' -exec python -m py_compile {} +
            
            echo "📋 Running flake8..."
            flake8 . --max-line-length=120 --ignore=E501,W292 --exclude=.git,__pycache__
            
            echo "📋 Checking formatting with black..."
            black --check . --exclude "/(\.git|\.venv)/"
          else
            echo "ℹ️ No Python files found. Skipping Python linting."
          fi

  # ==========================================
  # JOB 2: Security Scan
  # ==========================================
  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit (security linter)
        continue-on-error: true
        run: |
          if [ -n "$(find . -name '*.py' -not -path '*/\.*')" ]; then
            echo "🔒 Running Bandit security scan..."
            bandit -r . -f json -o bandit-report.json -x /.git,/__pycache__ || true
            echo "✅ Security scan complete"
          else
            echo "ℹ️ No Python files found. Skipping Bandit."
          fi

      - name: Check for known vulnerabilities
        continue-on-error: true
        run: |
          echo "🔒 Checking dependencies for known vulnerabilities..."
          safety check --json || true

  # ==========================================
  # JOB 3: Automated Testing
  # ==========================================
  run-unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Testing Tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run pytest (if test files exist)
        continue-on-error: true
        run: |
          echo "🧪 Running tests..."
          if [ -n "$(find . -name 'test_*.py')" ] || [ -d "tests/" ]; then
            pytest -v --tb=short || echo "⚠️ Tests failed, but continuing pipeline."
          else
            echo "ℹ️ No test files (test_*.py or tests/ directory) found."
          fi

  # ==========================================
  # JOB 4: Build & Archive Artifacts
  # ==========================================
  build-artifacts:
    name: Build & Archive
    runs-on: ubuntu-latest
    needs: run-unit-tests
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Archive workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace-artifacts
          path: |
            **/*
            !.git/**
          retention-days: 30

      - name: Create build summary
        run: |
          echo "# Build Summary" > build_summary.md
          echo "" >> build_summary.md
          echo "**Ticket System:** ${{ env.TICKET_SYSTEM }}" >> build_summary.md
          echo "**Branch:** ${{ github.ref }}" >> build_summary.md
          echo "**Commit:** ${{ github.sha }}" >> build_summary.md
          echo "**Time:** $(date)" >> build_summary.md
          cat build_summary.md

  # ==========================================
  # JOB 5: Conditional Deployment
  # ==========================================
  deploy-to-target:
    name: Deploy to Target
    runs-on: ubuntu-latest
    needs: build-artifacts
    environment: Dev
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Check if deployment is skipped
        if: env.DEPLOYMENT_TARGET == 'none'
        run: |
          echo "⏭️ Deployment target is set to 'none'. Skipping deployment process."
          exit 0

      - name: Set up Node.js
        if: env.DEPLOYMENT_TARGET == 'netlify'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Deploy to AWS (if configured)
        if: env.DEPLOYMENT_TARGET == 'aws'
        run: echo "✅ AWS deployment placeholder"

      - name: 🚀 Deploy to GCP (if configured)
        if: env.DEPLOYMENT_TARGET == 'gcp'
        run: echo "✅ GCP deployment placeholder"

      - name: 🚀 Deploy to Azure (if configured)
        if: env.DEPLOYMENT_TARGET == 'azure'
        run: echo "✅ Azure deployment placeholder"

      - name: 🚀 Deploy to Docker Hub (if configured)
        if: env.DEPLOYMENT_TARGET == 'docker'
        run: echo "✅ Docker deployment placeholder"

      - name: 🚀 Deploy to GitHub Pages (if configured)
        if: env.DEPLOYMENT_TARGET == 'github-pages'
        run: echo "✅ GitHub Pages deployment placeholder"

      - name: 🚀 Deploy to Netlify (if configured)
        if: env.DEPLOYMENT_TARGET == 'netlify'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          echo "📦 Deploying workspace to Netlify..."
          npm install -g netlify-cli
          
          # Automatically pushes the current workspace folder directory
          netlify deploy --prod --dir=.
          
          echo "✅ Netlify deployment complete"

      - name: 🎉 Deployment Complete
        if: env.DEPLOYMENT_TARGET != 'none'
        run: |
          echo "✅ Successfully deployed to ${{ env.DEPLOYMENT_TARGET }}"
          echo "🔗 Branch: ${{ github.ref }}"

  # ==========================================
  # JOB 6: Notify Completion
  # ==========================================
  notify-completion:
    name: Notify Pipeline Completion
    runs-on: ubuntu-latest
    needs: [deploy-to-target]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.deploy-to-target.result }}" == "success" ]; then
            echo "✅ Pipeline completed successfully!"
          elif [ "${{ needs.deploy-to-target.result }}" == "skipped" ]; then
            echo "⏭️ Deployment was skipped (not on deployment branch or no target)"
          else
            echo "⚠️ Pipeline had failures. Check logs."
          fi

      - name: Summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Ticket System:** ${{ env.TICKET_SYSTEM }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Target:** ${{ env.DEPLOYMENT_TARGET }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY