<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            background-color: #C6F4D6; /* light green */
            font-family: Arial, sans-serif;
        }

        .game-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 300px; /* adjust width as needed */
            margin: 40px auto;
        }

        .row {
            display: flex;
        }

        .square {
            width: 100px;
            height: 100px;
            border: 1px solid #000;
            font-size: 36px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .restart-button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }

        .restart-button:hover {
            background-color: #3e8e41;
        }

        @media only screen and (max-width: 600px) {
            .game-board {
                width: 200px;
            }
            .square {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-board">
        <div class="row">
            <div class="square" id="square-0"></div>
            <div class="square" id="square-1"></div>
            <div class="square" id="square-2"></div>
        </div>
        <div class="row">
            <div class="square" id="square-3"></div>
            <div class="square" id="square-4"></div>
            <div class="square" id="square-5"></div>
        </div>
        <div class="row">
            <div class="square" id="square-6"></div>
            <div class="square" id="square-7"></div>
            <div class="square" id="square-8"></div>
        </div>
    </div>
    <button class="restart-button">Restart Game</button>
    <script>
        let gameBoard = [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '];
        let currentPlayer = 'X';

        function handleSquareClick(index) {
            if (gameBoard[index] === ' ') {
                gameBoard[index] = currentPlayer;
                renderGameBoard();
                checkWin();
                currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
            }
        }

        function checkWin() {
            const winConditions = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];

            for (let i = 0; i < winConditions.length; i++) {
                const [a, b, c] = winConditions[i];
                if (gameBoard[a] === gameBoard[b] && gameBoard[b] === gameBoard[c] && gameBoard[a] !== ' ') {
                    alert(`Player ${gameBoard[a]} wins!`);
                    return;
                }
            }

            if (!gameBoard.includes(' ')) {
                alert('It\'s a draw!');
            }
        }

        function renderGameBoard() {
            const squares = document.querySelectorAll('.square');
            for (let i = 0; i < squares.length; i++) {
                squares[i].textContent = gameBoard[i];
            }
        }

        function restartGame() {
            gameBoard = [' ', ' ', ' ', ' ', ' ', ' ', ' ', ' ', ' '];
            currentPlayer = 'X';
            renderGameBoard();
        }

        document.querySelectorAll('.square').forEach((square, index) => {
            square.addEventListener('click', () => handleSquareClick(index));
        });

        document.querySelector('.restart-button').addEventListener('click', restartGame);

        renderGameBoard();
    </script>
</body>
</html>
