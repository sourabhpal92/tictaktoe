<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            width: 300px;
            margin: 40px auto;
        }
        
        .game-square {
            background-color: #f0f0f0;
            padding: 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
        }
        
        .game-square:hover {
            background-color: #ccc;
        }
        
        .restart-button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .restart-button:hover {
            background-color: #3e8e41;
        }
        
        .win-message {
            font-size: 24px;
            font-weight: bold;
            color: #666;
            margin-bottom: 20px;
        }
        
        .draw-message {
            font-size: 24px;
            font-weight: bold;
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <h1>Tic Tac Toe Game</h1>
    <div class="game-board" id="game-board">
        <button class="game-square" id="square-0"></button>
        <button class="game-square" id="square-1"></button>
        <button class="game-square" id="square-2"></button>
        <button class="game-square" id="square-3"></button>
        <button class="game-square" id="square-4"></button>
        <button class="game-square" id="square-5"></button>
        <button class="game-square" id="square-6"></button>
        <button class="game-square" id="square-7"></button>
        <button class="game-square" id="square-8"></button>
    </div>
    <button class="restart-button" id="restart-button">Restart Game</button>
    <div class="win-message" id="win-message"></div>
    <div class="draw-message" id="draw-message"></div>

    <script>
        class Game {
            constructor() {
                this.gameBoard = [];
                this.activePlayer = 'X';
                this.gameOver = false;
                this.initGameBoard();
                this.addEventListeners();
            }

            initGameBoard() {
                for (let i = 0; i < 9; i++) {
                    this.gameBoard.push('');
                    const square = document.getElementById(`square-${i}`);
                    square.innerHTML = '';
                }
            }

            addEventListeners() {
                const squares = document.querySelectorAll('.game-square');
                squares.forEach((square) => {
                    square.addEventListener('click', () => {
                        if (!this.gameOver) {
                            const index = parseInt(square.id.split('-')[1]);
                            if (this.gameBoard[index] === '') {
                                this.gameBoard[index] = this.activePlayer;
                                square.innerHTML = this.activePlayer;
                                this.checkWinConditions();
                                this.checkDrawConditions();
                                this.activePlayer = this.activePlayer === 'X' ? 'O' : 'X';
                            }
                        }
                    });
                });

                const restartButton = document.getElementById('restart-button');
                restartButton.addEventListener('click', () => {
                    this.restartGame();
                });
            }

            checkWinConditions() {
                const winConditions = [
                    [0, 1, 2],
                    [3, 4, 5],
                    [6, 7, 8],
                    [0, 3, 6],
                    [1, 4, 7],
                    [2, 5, 8],
                    [0, 4, 8],
                    [2, 4, 6],
                ];

                for (let i = 0; i < winConditions.length; i++) {
                    const condition = winConditions[i];
                    if (
                        this.gameBoard[condition[0]] === this.gameBoard[condition[1]] &&
                        this.gameBoard[condition[1]] === this.gameBoard[condition[2]] &&
                        this.gameBoard[condition[0]] !== ''
                    ) {
                        this.gameOver = true;
                        this.displayWinMessage(this.gameBoard[condition[0]]);
                        return;
                    }
                }
            }

            checkDrawConditions() {
                if (!this.gameOver && !this.gameBoard.includes('')) {
                    this.gameOver = true;
                    this.displayDrawMessage();
                }
            }

            displayWinMessage(winner) {
                const winMessage = document.getElementById('win-message');
                winMessage.innerHTML = `Player ${winner} wins!`;
                winMessage.style.display = 'block';
            }

            displayDrawMessage() {
                const drawMessage = document.getElementById('draw-message');
                drawMessage.innerHTML = 'It\'s a draw!';
                drawMessage.style.display = 'block';
            }

            restartGame() {
                this.gameOver = false;
                this.activePlayer = 'X';
                this.initGameBoard();
                const winMessage = document.getElementById('win-message');
                winMessage.innerHTML = '';
                winMessage.style.display = 'none';
                const drawMessage = document.getElementById('draw-message');
                drawMessage.innerHTML = '';
                drawMessage.style.display = 'none';
            }
        }

        const game = new Game();
    </script>
</body>
</html>
