<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            width: 300px;
            height: 300px;
            border: 1px solid #ccc;
            margin: 40px auto;
        }
        
        .square {
            background-color: #f0f0f0;
            padding: 20px;
            border: 1px solid #ccc;
            cursor: pointer;
            font-size: 24px;
        }
        
        .square:hover {
            background-color: #e0e0e0;
        }
        
        #game-status {
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        #restart-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        #restart-button:hover {
            background-color: #3e8e41;
        }
        
        @media only screen and (max-width: 600px) {
            .game-board {
                width: 200px;
                height: 200px;
            }
            .square {
                padding: 10px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="game-status"></div>
    <div class="game-board">
        <div class="square" id="square-1"></div>
        <div class="square" id="square-2"></div>
        <div class="square" id="square-3"></div>
        <div class="square" id="square-4"></div>
        <div class="square" id="square-5"></div>
        <div class="square" id="square-6"></div>
        <div class="square" id="square-7"></div>
        <div class="square" id="square-8"></div>
        <div class="square" id="square-9"></div>
    </div>
    <button id="restart-button">Restart Game</button>
    <script>
        let game = {
            board: ['', '', '', '', '', '', '', '', ''],
            activePlayer: 'X',
            winner: null,
            gameOver: false
        };

        const gameBoard = document.querySelectorAll('.square');
        const restartButton = document.getElementById('restart-button');
        const gameStatus = document.getElementById('game-status');

        gameBoard.forEach((square) => {
            square.addEventListener('click', handleSquareClick);
        });

        restartButton.addEventListener('click', restartGame);

        function handleSquareClick(event) {
            const square = event.target;
            const squareIndex = parseInt(square.id.replace('square-', '')) - 1;

            if (game.board[squareIndex] === '' && !game.gameOver) {
                game.board[squareIndex] = game.activePlayer;
                square.textContent = game.activePlayer;
                switchTurns();
                checkForWinner();
                updateGameStatus();
            }
        }

        function switchTurns() {
            game.activePlayer = game.activePlayer === 'X' ? 'O' : 'X';
        }

        function checkForWinner() {
            const winningCombinations = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];

            for (let i = 0; i < winningCombinations.length; i++) {
                const combination = winningCombinations[i];
                if (game.board[combination[0]] === game.board[combination[1]] &&
                    game.board[combination[1]] === game.board[combination[2]] &&
                    game.board[combination[0]] !== '') {
                    game.winner = game.board[combination[0]];
                    game.gameOver = true;
                    return;
                }
            }

            if (!game.board.includes('')) {
                game.gameOver = true;
            }
        }

        function updateGameStatus() {
            if (game.gameOver) {
                if (game.winner) {
                    gameStatus.textContent = `Player ${game.winner} wins!`;
                } else {
                    gameStatus.textContent = 'It\'s a draw!';
                }
            } else {
                gameStatus.textContent = `Player ${game.activePlayer}'s turn`;
            }
        }

        function restartGame() {
            game.board = ['', '', '', '', '', '', '', '', ''];
            game.activePlayer = 'X';
            game.winner = null;
            game.gameOver = false;
            gameBoard.forEach((square) => {
                square.textContent = '';
            });
            updateGameStatus();
        }
    </script>
</body>
</html>
