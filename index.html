<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <style>
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            width: 300px;
            height: 300px;
            background-color: #ADD8E6; /* light blue background */
            margin: 20px auto;
        }

        .square {
            width: 100%;
            height: 100%;
            border: 1px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
        }

        #restart-button {
            margin: 20px auto;
            display: block;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }

        #restart-button:hover {
            background-color: #3e8e41;
        }

        @media only screen and (max-width: 600px) {
            .game-board {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="game-board">
        <div class="row">
            <div class="square" id="square-0" data-index="0"></div>
            <div class="square" id="square-1" data-index="1"></div>
            <div class="square" id="square-2" data-index="2"></div>
        </div>
        <div class="row">
            <div class="square" id="square-3" data-index="3"></div>
            <div class="square" id="square-4" data-index="4"></div>
            <div class="square" id="square-5" data-index="5"></div>
        </div>
        <div class="row">
            <div class="square" id="square-6" data-index="6"></div>
            <div class="square" id="square-7" data-index="7"></div>
            <div class="square" id="square-8" data-index="8"></div>
        </div>
    </div>
    <button id="restart-button">Restart Game</button>

    <script>
        let currentPlayer = 'X';
        let gameBoard = new Array(9).fill('');
        let gameOver = false;

        const squares = document.querySelectorAll('.square');
        squares.forEach((square) => {
            square.addEventListener('click', handleMove);
        });

        document.getElementById('restart-button').addEventListener('click', restartGame);

        function handleMove(event) {
            const square = event.target;
            const squareIndex = parseInt(square.dataset.index);
            if (gameOver || gameBoard[squareIndex] !== '') return;
            gameBoard[squareIndex] = currentPlayer;
            square.innerHTML = currentPlayer;
            checkWinCondition();
            checkDrawCondition();
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        function checkWinCondition() {
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // horizontal
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // vertical
                [0, 4, 8], [2, 4, 6] // diagonal
            ];
            for (const condition of winConditions) {
                if (gameBoard[condition[0]] === gameBoard[condition[1]] &&
                    gameBoard[condition[1]] === gameBoard[condition[2]] &&
                    gameBoard[condition[0]] !== '') {
                    gameOver = true;
                    alert(`Player ${gameBoard[condition[0]]} wins!`);
                    return;
                }
            }
        }

        function checkDrawCondition() {
            if (!gameBoard.includes('')) {
                gameOver = true;
                alert('It\'s a draw!');
            }
        }

        function restartGame() {
            gameBoard = new Array(9).fill('');
            currentPlayer = 'X';
            gameOver = false;
            squares.forEach((square) => {
                square.innerHTML = '';
            });
        }
    </script>
</body>
</html>
