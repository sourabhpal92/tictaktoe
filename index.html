<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <style>
    .game-board {
      background-color: #add8e6; /* light blue */
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .row {
      display: flex;
    }

    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
    }

    #restart-button {
      margin-top: 20px;
    }

    @media only screen and (max-width: 600px) {
      .game-board {
        flex-direction: column;
      }
      .row {
        flex-direction: row;
      }
      .cell {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div class="game-board">
    <div class="row">
      <div class="cell" id="cell-0"></div>
      <div class="cell" id="cell-1"></div>
      <div class="cell" id="cell-2"></div>
    </div>
    <div class="row">
      <div class="cell" id="cell-3"></div>
      <div class="cell" id="cell-4"></div>
      <div class="cell" id="cell-5"></div>
    </div>
    <div class="row">
      <div class="cell" id="cell-6"></div>
      <div class="cell" id="cell-7"></div>
      <div class="cell" id="cell-8"></div>
    </div>
  </div>
  <button id="restart-button">Restart Game</button>
  <script>
    let board = [];
    let currentPlayer = "X";
    let gameOver = false;

    // Initialize game board
    for (let i = 0; i < 9; i++) {
      board.push(null);
    }

    // Add event listeners to cells
    for (let i = 0; i < 9; i++) {
      const cell = document.getElementById(`cell-${i}`);
      cell.addEventListener("click", () => {
        if (gameOver) {
          return;
        }
        if (board[i] === null) {
          cell.textContent = currentPlayer;
          board[i] = currentPlayer;

          // Check for win condition
          if (checkWin()) {
            gameOver = true;
            alert(`Player ${currentPlayer} wins!`);
          } else if (checkDraw()) {
            gameOver = true;
            alert("It's a draw!");
          } else {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
          }
        }
      });
    }

    // Add event listener to restart button
    document.getElementById("restart-button").addEventListener("click", () => {
      // Reset game state
      currentPlayer = "X";
      gameOver = false;
      board = new Array(9).fill(null);
      // Reset game board display
      for (let i = 0; i < 9; i++) {
        const cell = document.getElementById(`cell-${i}`);
        cell.textContent = "";
      }
    });

    // Function to check for win condition
    function checkWin() {
      // Check rows and columns
      for (let i = 0; i < 3; i++) {
        if (board[i * 3] !== null && board[i * 3] === board[i * 3 + 1] && board[i * 3] === board[i * 3 + 2]) {
          return true;
        }
        if (board[i] !== null && board[i] === board[i + 3] && board[i] === board[i + 6]) {
          return true;
        }
      }
      // Check diagonals
      if (board[0] !== null && board[0] === board[4] && board[0] === board[8]) {
        return true;
      }
      if (board[2] !== null && board[2] === board[4] && board[2] === board[6]) {
        return true;
      }
      return false;
    }

    // Function to check for draw condition
    function checkDraw() {
      for (let i = 0; i < 9; i++) {
        if (board[i] === null) {
          return false;
        }
      }
      return true;
    }
  </script>
</body>
</html>
