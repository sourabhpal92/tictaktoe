<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            background-color: lightblue;
            padding: 20px;
            border: 1px solid black;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .grid-square {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
            background-color: #f0f0f0;
            border-radius: 10px;
        }

        #restart-button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #4CAF50;
            color: #fff;
            cursor: pointer;
        }

        #restart-button:hover {
            background-color: #3e8e41;
        }

        @media only screen and (max-width: 600px) {
            .game-board {
                grid-gap: 5px;
                padding: 10px;
            }

            .grid-square {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="game-board"></div>
    <button id="restart-button">Restart Game</button>
    <script>
        let gameBoard = [];
        let currentPlayer = 'X';

        // Initialize game board
        for (let i = 0; i < 3; i++) {
            gameBoard.push([]);
            for (let j = 0; j < 3; j++) {
                gameBoard[i].push('');
            }
        }

        // Handle player moves
        function handleMove(event) {
            const square = event.target;
            const row = square.dataset.row;
            const col = square.dataset.col;
            if (gameBoard[row][col] === '') {
                gameBoard[row][col] = currentPlayer;
                square.textContent = currentPlayer;
                checkWin();
                checkDraw();
                switchTurns();
            }
        }

        // Check for win conditions
        function checkWin() {
            // Check horizontal wins
            for (let i = 0; i < 3; i++) {
                if (gameBoard[i][0] === gameBoard[i][1] && gameBoard[i][1] === gameBoard[i][2] && gameBoard[i][0] !== '') {
                    alert(`Player ${gameBoard[i][0]} wins!`);
                    return;
                }
            }
            // Check vertical wins
            for (let i = 0; i < 3; i++) {
                if (gameBoard[0][i] === gameBoard[1][i] && gameBoard[1][i] === gameBoard[2][i] && gameBoard[0][i] !== '') {
                    alert(`Player ${gameBoard[0][i]} wins!`);
                    return;
                }
            }
            // Check diagonal wins
            if (gameBoard[0][0] === gameBoard[1][1] && gameBoard[1][1] === gameBoard[2][2] && gameBoard[0][0] !== '') {
                alert(`Player ${gameBoard[0][0]} wins!`);
                return;
            }
            if (gameBoard[0][2] === gameBoard[1][1] && gameBoard[1][1] === gameBoard[2][0] && gameBoard[0][2] !== '') {
                alert(`Player ${gameBoard[0][2]} wins!`);
                return;
            }
        }

        // Check for draw conditions
        function checkDraw() {
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if (gameBoard[i][j] === '') {
                        return;
                    }
                }
            }
            alert('It\'s a draw!');
        }

        // Switch turns between players
        function switchTurns() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }

        // Handle restart button click
        function handleRestart() {
            gameBoard = [];
            for (let i = 0; i < 3; i++) {
                gameBoard.push([]);
                for (let j = 0; j < 3; j++) {
                    gameBoard[i].push('');
                }
            }
            currentPlayer = 'X';
            const gridSquares = document.querySelectorAll('.grid-square');
            gridSquares.forEach((square) => {
                square.textContent = '';
            });
        }

        // Initialize grid squares and add event listeners
        const gridContainer = document.querySelector('.game-board');
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                const gridSquare = document.createElement('div');
                gridSquare.classList.add('grid-square');
                gridSquare.dataset.row = i;
                gridSquare.dataset.col = j;
                gridSquare.addEventListener('click', handleMove);
                gridContainer.appendChild(gridSquare);
            }
        }

        // Add event listener to restart button
        const restartButton = document.querySelector('#restart-button');
        restartButton.addEventListener('click', handleRestart);
    </script>
</body>
</html>
