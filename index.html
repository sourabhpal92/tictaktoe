<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        
        .game-container {
            max-width: 300px;
            margin: 40px auto;
            background-color: #ccffcc;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
        }
        
        .grid-square {
            background-color: #fff;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        
        .grid-square:hover {
            background-color: #f5f5f5;
        }
        
        #restart-button {
            background-color: #4CAF50;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        #restart-button:hover {
            background-color: #3e8e41;
        }
        
        #game-status {
            font-size: 18px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="grid">
            <div class="grid-square" data-index="0"></div>
            <div class="grid-square" data-index="1"></div>
            <div class="grid-square" data-index="2"></div>
            <div class="grid-square" data-index="3"></div>
            <div class="grid-square" data-index="4"></div>
            <div class="grid-square" data-index="5"></div>
            <div class="grid-square" data-index="6"></div>
            <div class="grid-square" data-index="7"></div>
            <div class="grid-square" data-index="8"></div>
        </div>
        <button id="restart-button">Restart Game</button>
        <div id="game-status"></div>
    </div>
    
    <script>
        // Game state
        let currentPlayer = 'X';
        let board = Array(9).fill(null);
        let gameOver = false;
        
        // Event listeners
        document.querySelectorAll('.grid-square').forEach(square => {
            square.addEventListener('click', handleSquareClick);
        });
        
        document.querySelector('#restart-button').addEventListener('click', restartGame);
        
        // Handle square click event
        function handleSquareClick(event) {
            if (gameOver) return;
            const squareIndex = event.target.dataset.index;
            if (board[squareIndex] === null) {
                board[squareIndex] = currentPlayer;
                updateUI();
                checkForWinOrDraw();
                switchPlayer();
            }
        }
        
        // Switch current player
        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }
        
        // Check for win or draw condition
        function checkForWinOrDraw() {
            // Check rows
            for (let i = 0; i < 3; i++) {
                if (board[i * 3] !== null && board[i * 3] === board[i * 3 + 1] && board[i * 3] === board[i * 3 + 2]) {
                    gameOver = true;
                    updateGameStatus(`Player ${board[i * 3]} wins!`);
                    return;
                }
            }
            
            // Check columns
            for (let i = 0; i < 3; i++) {
                if (board[i] !== null && board[i] === board[i + 3] && board[i] === board[i + 6]) {
                    gameOver = true;
                    updateGameStatus(`Player ${board[i]} wins!`);
                    return;
                }
            }
            
            // Check diagonals
            if (board[0] !== null && board[0] === board[4] && board[0] === board[8]) {
                gameOver = true;
                updateGameStatus(`Player ${board[0]} wins!`);
                return;
            }
            
            if (board[2] !== null && board[2] === board[4] && board[2] === board[6]) {
                gameOver = true;
                updateGameStatus(`Player ${board[2]} wins!`);
                return;
            }
            
            // Check for draw
            if (!board.includes(null)) {
                gameOver = true;
                updateGameStatus("It's a draw!");
            }
        }
        
        // Update UI to display game state
        function updateUI() {
            document.querySelectorAll('.grid-square').forEach((square, index) => {
                square.textContent = board[index] !== null ? board[index] : '';
            });
            
            document.querySelector('#game-status').textContent = `It's player ${currentPlayer}'s turn`;
        }
        
        // Update game status
        function updateGameStatus(message) {
            document.querySelector('#game-status').textContent = message;
        }
        
        // Restart game
        function restartGame() {
            board = Array(9).fill(null);
            currentPlayer = 'X';
            gameOver = false;
            updateUI();
        }
        
        updateUI();
    </script>
</body>
</html>
