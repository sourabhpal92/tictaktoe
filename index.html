<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            width: 300px;
            margin: 40px auto;
        }

        .cell {
            background-color: #f0f0f0;
            padding: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .cell:hover {
            background-color: #ccc;
        }

        #restart-button {
            margin: 20px auto;
            display: block;
        }

        @media only screen and (max-width: 600px) {
            .game-board {
                width: 100%;
                grid-gap: 5px;
            }
            .cell {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-board">
        <div class="cell" id="cell-0"></div>
        <div class="cell" id="cell-1"></div>
        <div class="cell" id="cell-2"></div>
        <div class="cell" id="cell-3"></div>
        <div class="cell" id="cell-4"></div>
        <div class="cell" id="cell-5"></div>
        <div class="cell" id="cell-6"></div>
        <div class="cell" id="cell-7"></div>
        <div class="cell" id="cell-8"></div>
    </div>
    <button id="restart-button">Restart Game</button>
    <script>
        const gameState = {
            board: ['', '', '', '', '', '', '', '', ''],
            activePlayer: 'X',
            gameOver: false
        };

        const gameCells = document.querySelectorAll('.cell');
        const restartButton = document.getElementById('restart-button');

        gameCells.forEach((cell, index) => {
            cell.addEventListener('click', () => {
                handleCellClick(index);
            });
        });

        restartButton.addEventListener('click', () => {
            restartGame();
        });

        function handleCellClick(index) {
            if (gameState.board[index] === '' && !gameState.gameOver) {
                gameState.board[index] = gameState.activePlayer;
                updateGameBoard();
                checkForWin();
                switchPlayer();
            }
        }

        function updateGameBoard() {
            gameCells.forEach((cell, index) => {
                cell.textContent = gameState.board[index];
            });
        }

        function checkForWin() {
            const winConditions = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];

            for (const condition of winConditions) {
                if (gameState.board[condition[0]] === gameState.board[condition[1]] &&
                    gameState.board[condition[1]] === gameState.board[condition[2]] &&
                    gameState.board[condition[0]] !== '') {
                    declareWinner();
                    return;
                }
            }

            if (!gameState.board.includes('')) {
                declareDraw();
            }
        }

        function switchPlayer() {
            gameState.activePlayer = gameState.activePlayer === 'X' ? 'O' : 'X';
        }

        function declareWinner() {
            alert(`Player ${gameState.activePlayer} wins!`);
            gameState.gameOver = true;
        }

        function declareDraw() {
            alert('It\'s a draw!');
            gameState.gameOver = true;
        }

        function restartGame() {
            gameState.board = ['', '', '', '', '', '', '', '', ''];
            gameState.activePlayer = 'X';
            gameState.gameOver = false;
            updateGameBoard();
        }
    </script>
</body>
</html>
