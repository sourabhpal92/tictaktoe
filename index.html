<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .game-board {
            background-color: #ADD8E6; /* light blue */
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            padding: 20px;
            max-width: 300px;
            margin: 40px auto;
        }
        .cell {
            background-color: #FFFFFF;
            border: 1px solid #000000;
            padding: 20px;
            font-size: 24px;
            text-align: center;
            cursor: pointer;
        }
        .restart-button {
            margin: 20px auto;
            display: block;
        }
        @media only screen and (max-width: 600px) {
            .game-board {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="game-board">
        <div class="row">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
        </div>
        <div class="row">
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
        </div>
        <div class="row">
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
    </div>
    <button class="restart-button">Restart Game</button>
    <script>
        let currentPlayer = 'X';
        let gameBoard = new Array(9).fill(null);
        let winner = null;

        function initGame() {
            gameBoard = new Array(9).fill(null);
            currentPlayer = 'X';
            winner = null;
            renderGameBoard();
        }

        function handleMove(index) {
            if (gameBoard[index] === null && winner === null) {
                gameBoard[index] = currentPlayer;
                currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
                renderGameBoard();
                checkForWin();
            }
        }

        function checkForWin() {
            const winConditions = [
                [0, 1, 2],
                [3, 4, 5],
                [6, 7, 8],
                [0, 3, 6],
                [1, 4, 7],
                [2, 5, 8],
                [0, 4, 8],
                [2, 4, 6]
            ];
            for (const condition of winConditions) {
                if (gameBoard[condition[0]] !== null &&
                    gameBoard[condition[0]] === gameBoard[condition[1]] &&
                    gameBoard[condition[0]] === gameBoard[condition[2]]) {
                    winner = gameBoard[condition[0]];
                    alert(`Player ${winner} wins!`);
                    return;
                }
            }
            if (!gameBoard.includes(null)) {
                alert('It\'s a draw!');
            }
        }

        function renderGameBoard() {
            const cells = document.querySelectorAll('.cell');
            for (let i = 0; i < 9; i++) {
                cells[i].textContent = gameBoard[i] || '';
            }
        }

        initGame();

        const cells = document.querySelectorAll('.cell');
        for (const cell of cells) {
            cell.addEventListener('click', () => {
                const index = parseInt(cell.dataset.index);
                handleMove(index);
            });
        }

        const restartButton = document.querySelector('.restart-button');
        restartButton.addEventListener('click', initGame);
    </script>
</body>
</html>
